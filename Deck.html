document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Brains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"008b6c99-f457-4623-8cac-87718c5478a8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --cream:#FAF7F5;\n  --cream-2:#F4EFEA;\n  --ink:#1B1F2A;\n  --ink-2:#3A3F4E;\n  --ink-3:#7B7E8A;\n  --line:#E6DFDA;\n  --line-2:#EFE8E2;\n  --navy:#141A2E;\n  --navy-2:#1F2644;\n  --navy-3:#2A3252;\n  --pink:#F54E7A;\n  --pink-600:#D93D66;\n  --pink-soft:#FFE4EC;\n  --green:#16A34A;\n  --green-soft:#D1FAE5;\n  --amber:#F59E0B;\n  --blue:#3B82F6;\n  --font-sans:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;\n  --font-display:'Inter',ui-sans-serif,system-ui,sans-serif;\n  --font-mono:'JetBrains Mono',ui-monospace,monospace;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{background:#0a0a0f;font-family:var(--font-sans);color:var(--ink);-webkit-font-smoothing:antialiased}\n\n\u002F* ============ BASE SLIDE ============ *\u002F\ndeck-stage > section.slide{\n  width:1920px;height:1080px;\n  background:var(--cream);\n  padding:80px 100px 80px;\n  display:flex;flex-direction:column;\n  position:relative;overflow:hidden;\n  color:var(--ink);\n}\ndeck-stage > section.slide.dark{background:var(--navy);color:#fff}\ndeck-stage em{font-style:italic;font-weight:400;color:var(--pink)}\ndeck-stage h1,deck-stage h2{font-weight:400;letter-spacing:-.028em}\n\n\u002F* ============ CHROME (top bar) ============ *\u002F\n.chrome{position:absolute;top:42px;left:100px;right:100px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:18px;color:var(--ink-3);letter-spacing:.16em;text-transform:uppercase;font-weight:500}\n.dark .chrome{color:rgba(255,255,255,.5)}\n.chrome .brand{display:flex;align-items:center;gap:10px;color:var(--pink)}\n.chrome .brand::before{content:\"\";width:56px;height:17px;background-image:url(\"8ebaccee-3c3c-4d13-8c02-7a63ff1b1af4\");background-size:contain;background-repeat:no-repeat;background-position:left center}\n.dark .chrome .brand::before{background-image:url(\"561b3772-0713-4095-9d7f-f75ef83a87bf\")}\n.chrome .page b{color:var(--ink);font-weight:500}\n.dark .chrome .page b{color:#fff}\n\n.eyebrow{font-family:var(--font-mono);font-size:20px;letter-spacing:.22em;text-transform:uppercase;color:var(--pink);margin-bottom:32px;display:inline-flex;align-items:center;gap:16px;font-weight:500}\n.eyebrow::before{content:\"\";width:40px;height:2px;background:var(--pink)}\n.dark .eyebrow{color:var(--pink)}\n\n.editable{border-bottom:1.5px dotted rgba(245,78,122,.5);cursor:text;outline:none;padding:0 2px}\n.editable:focus{background:rgba(245,78,122,.08);border-bottom-style:solid}\n\n\u002F* ============ TYPE SCALE ============\n   Very large for projection readability\n   Titles 96-160 · Subtitle 42 · Body 32 · Small 24 *\u002F\n\n\u002F* ============ SLIDE 1 · COVER ============ *\u002F\n.s1{justify-content:space-between;padding-top:64px;padding-bottom:64px;gap:28px}\n.s1-head{display:flex;align-items:center;justify-content:space-between;gap:40px}\n.s1-logo{height:64px;width:auto;display:block}\n.s1-tag{font-family:var(--font-mono);font-size:16px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);text-align:right;line-height:1.7;font-weight:500}\n.s1-tag b{color:var(--ink);font-weight:500}\n.s1-hero{flex:1;display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center;min-height:0}\n.s1-left h1{font-family:var(--font-display);font-size:86px;font-weight:400;letter-spacing:-.035em;line-height:1.16}\n.s1-left h1 em{color:var(--pink);font-style:italic}\n.s1-left .lede{margin-top:32px;font-size:26px;line-height:1.4;color:var(--ink-2);max-width:760px}\n\n.cover-device{background:var(--navy);border-radius:24px;padding:16px;box-shadow:0 40px 80px rgba(20,26,46,.25),0 0 0 1px rgba(20,26,46,.08);position:relative}\n.cover-device .bar{display:flex;align-items:center;gap:8px;padding:4px 8px 16px}\n.cover-device .dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.2)}\n.cover-device .url{margin-left:12px;flex:1;background:rgba(255,255,255,.08);border-radius:8px;padding:8px 16px;font-family:var(--font-mono);font-size:14px;color:rgba(255,255,255,.6);letter-spacing:.04em}\n.cover-device .screen{background:var(--cream);border-radius:14px;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}\n.cover-device .tile{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;display:flex;flex-direction:column}\n.cover-device .tile.wide{grid-column:1\u002F-1}\n.cover-device .tile .k{font-family:var(--font-mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:500;margin-bottom:8px}\n.cover-device .tile .v{font-family:var(--font-display);font-size:34px;font-weight:400;letter-spacing:-.02em;line-height:1;color:var(--ink)}\n.cover-device .tile .v em{color:var(--pink);font-style:italic}\n.cover-device .tile.pink{background:var(--navy);color:#fff}\n.cover-device .tile.pink .k{color:rgba(255,255,255,.55)}\n.cover-device .tile.pink .v{color:#fff}\n.cover-device .tile.pink .v em{color:var(--pink)}\n.cover-device .delta{margin-top:6px;font-family:var(--font-mono);font-size:13px;color:var(--green);letter-spacing:.06em;font-weight:500}\n.cover-device .tile.pink .delta{color:#4ADE80}\n.cover-device .spark{margin-top:8px;display:flex;align-items:flex-end;gap:3px;height:24px}\n.cover-device .spark span{flex:1;background:var(--pink);border-radius:1px;opacity:.8}\n.cover-device .wide .rows{display:flex;flex-direction:column;gap:10px;margin-top:8px}\n.cover-device .wide .rr{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:14px;color:var(--ink-3);padding-bottom:8px;border-bottom:1px dashed var(--line)}\n.cover-device .wide .rr b{color:var(--ink);font-weight:500}\n\n.s1-foot{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 180px;gap:0;border-top:1px solid var(--line);padding-top:22px}\n.s1-foot .cell{padding-right:30px;border-right:1px solid var(--line)}\n.s1-foot .cell:last-child{border-right:none;padding-right:0;text-align:right}\n.s1-foot .k{font-family:var(--font-mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;font-weight:500}\n.s1-foot .v{font-family:var(--font-display);font-size:24px;color:var(--ink);letter-spacing:-.01em;line-height:1.1}\n.s1-foot .cell:last-child .v{font-family:var(--font-mono);font-size:15px;color:var(--pink);letter-spacing:.18em;text-transform:uppercase;font-weight:500}\n\n\u002F* ============ HEADER PATTERN (reused) ============ *\u002F\n.h-xl{font-family:var(--font-display);font-size:112px;font-weight:400;letter-spacing:-.03em;line-height:.95}\n.h-xl em{color:var(--pink);font-style:italic}\n.h-lg{font-family:var(--font-display);font-size:96px;font-weight:400;letter-spacing:-.028em;line-height:.96}\n.h-lg em{color:var(--pink);font-style:italic}\n.h-md{font-family:var(--font-display);font-size:80px;font-weight:400;letter-spacing:-.025em;line-height:.98}\n.h-md em{color:var(--pink);font-style:italic}\n.sub-lg{font-size:32px;line-height:1.45;color:var(--ink-3);max-width:900px;margin-top:28px}\n.dark .sub-lg{color:rgba(255,255,255,.7)}\n\n.split-head{margin-top:40px;margin-bottom:56px;display:grid;grid-template-columns:1.25fr 1fr;gap:60px;align-items:end}\n.split-head .sub-lg{margin-top:0;padding-bottom:10px;max-width:560px;font-size:26px}\n\n\u002F* ============ SLIDE 2 · AGENDA ============ *\u002F\n.s2-head{margin-top:36px;margin-bottom:36px}\n.s2-head h2{font-size:96px;line-height:.98}\n.s2-head .sub{margin-top:20px;font-size:24px;color:var(--ink-3);max-width:1200px;line-height:1.4}\n.agenda{display:grid;grid-template-columns:1fr 1fr;gap:4px 60px;flex:1;align-content:start}\n.ag-row{display:grid;grid-template-columns:70px 1fr 90px;gap:24px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}\n.ag-row .n{font-family:var(--font-mono);font-size:18px;color:var(--pink);letter-spacing:.18em;font-weight:500}\n.ag-row .t{font-family:var(--font-display);font-size:26px;color:var(--ink);line-height:1.2;letter-spacing:-.01em;font-weight:400}\n.ag-row .t small{display:block;font-family:var(--font-sans);font-size:16px;color:var(--ink-3);margin-top:4px;font-weight:400;letter-spacing:0;line-height:1.35}\n.ag-row .d{font-family:var(--font-mono);font-size:16px;color:var(--ink-3);letter-spacing:.14em;text-align:right;font-weight:500}\n\n\u002F* ============ SLIDE 3 · MARKET (stats) ============ *\u002F\n.s3-stats{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:32px;align-items:stretch;margin-top:24px}\n.s3-stat{background:#fff;border:1px solid var(--line);border-radius:24px;padding:44px;display:flex;flex-direction:column;gap:20px}\n.s3-stat .k{font-family:var(--font-mono);font-size:18px;color:var(--pink);letter-spacing:.2em;text-transform:uppercase;font-weight:500}\n.s3-stat .big{font-family:var(--font-display);font-size:140px;font-weight:400;letter-spacing:-.04em;line-height:.9;color:var(--ink)}\n.s3-stat .big.pink{color:var(--pink)}\n.s3-stat .big .unit{font-size:56px;color:var(--ink-3)}\n.s3-stat .big.pink .unit{color:var(--pink);opacity:.55}\n.s3-stat .d{font-size:24px;line-height:1.5;color:var(--ink-2);margin-top:auto}\n.s3-stat .src{font-family:var(--font-mono);font-size:14px;color:var(--ink-3);letter-spacing:.12em;text-transform:uppercase;padding-top:18px;border-top:1px dashed var(--line);font-weight:500}\n\n\u002F* ============ SLIDE 4 · OPERACION (table) ============ *\u002F\n.s4-table{flex:1;background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px 36px;margin-top:20px;display:flex;flex-direction:column;justify-content:center}\n.s4-thead{display:grid;grid-template-columns:70px 1fr 220px;gap:36px;padding:16px 0;border-bottom:2px solid var(--line);font-family:var(--font-mono);font-size:15px;color:var(--ink-3);letter-spacing:.18em;text-transform:uppercase;font-weight:500}\n.s4-row{display:grid;grid-template-columns:70px 1fr 220px;gap:36px;padding:22px 0;border-bottom:1px solid var(--line);align-items:center}\n.s4-row:last-child{border-bottom:none}\n.s4-row .n{font-family:var(--font-mono);font-size:20px;color:var(--pink);letter-spacing:.16em;font-weight:500}\n.s4-row > div:nth-child(2){font-family:var(--font-display);font-size:26px;color:var(--ink);letter-spacing:-.008em;line-height:1.25}\n.s4-row .tag{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);background:var(--cream-2);padding:10px 16px;border-radius:10px;text-align:center;line-height:1.3;font-weight:500}\n\n\u002F* ============ SLIDE 5 · 3 FUGAS ============ *\u002F\n.s5-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-top:24px}\n.s5-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:44px;display:flex;flex-direction:column;gap:22px}\n.s5-card .k{font-family:var(--font-mono);font-size:18px;color:var(--pink);letter-spacing:.2em;text-transform:uppercase;font-weight:500}\n.s5-card h3{font-family:var(--font-display);font-size:38px;font-weight:400;line-height:1.15;letter-spacing:-.015em}\n.s5-card p{font-size:22px;line-height:1.5;color:var(--ink-2)}\n.s5-card .stat{margin-top:auto;display:flex;justify-content:space-between;align-items:baseline;padding-top:22px;border-top:1px dashed var(--line)}\n.s5-card .stat .lbl{font-family:var(--font-mono);font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:500}\n.s5-card .stat .val{font-family:var(--font-display);font-size:52px;color:var(--pink);font-weight:400;font-style:italic;letter-spacing:-.02em}\n\n\u002F* ============ SLIDE 6 · FUNNEL DASHBOARD ============ *\u002F\n.dash-wrap{flex:1;background:#fff;border:1px solid var(--line);border-radius:24px;padding:40p  7;\n    let base = 0.2 + Math.random() * 0.15;\n    if(hour >= 1 && hour <= 5) base += 0.35;\n    if(day >= 0 && day <= 4) base += 0.15;\n    if(day === 5 || day === 6) base -= 0.25;\n    base += (Math.random() - 0.5) * 0.15;\n    return Math.max(0.05, Math.min(0.98, base));\n  }\n  const frag = document.createDocumentFragment();\n  for(let r=0; r<rows.length; r++){\n    const lbl = document.createElement('div');\n    lbl.className = 'hm-label';\n    lbl.textContent = rows[r];\n    frag.appendChild(lbl);\n    for(let c=0; c<12; c++){\n      const v = intensity(r, c);\n      const cell = document.createElement('div');\n      cell.className = 'hm-cell';\n      const r1=244, g1=239, b1=234;\n      const r2=245, g2=78,  b2=122;\n      const R = Math.round(r1 + (r2-r1)*v);\n      const G = Math.round(g1 + (g2-g1)*v);\n      const B = Math.round(b1 + (b2-b1)*v);\n      cell.style.background = `rgb(${R},${G},${B})`;\n      if(v > 0.55) cell.style.color = 'rgba(255,255,255,.9)';\n      cell.textContent = Math.round(v*100);\n      frag.appendChild(cell);\n    }\n  }\n  root.appendChild(frag);\n})();\n\n\u002F* ===== Calculadora ===== *\u002F\n(function(){\n  const $ = id => document.getElementById(id);\n  const inputIds = ['calc-leads','calc-resp','calc-cita','calc-ticket','calc-cierre','calc-inv'];\n  const inputs = inputIds.map($);\n  const fmtShort = n => {\n    if(!isFinite(n) || n<=0) return '—';\n    if(n >= 1e6) return (n\u002F1e6).toFixed(1).replace(\u002F\\.0$\u002F,'') + 'M';\n    if(n >= 1e3) return Math.round(n\u002F1e3) + 'K';\n    return Math.round(n).toLocaleString('es-MX');\n  };\n  const fmtFull = n => !isFinite(n)||n<=0 ? '$—' : '$' + Math.round(n).toLocaleString('es-MX');\n  function lossRate(m){\n    if(m<=0) return 0; if(m<=5) return 0.05; if(m<=30) return 0.30;\n    if(m<=60) return 0.50; if(m<=240) return 0.65; if(m<=1440) return 0.78; return 0.85;\n  }\n  const DOPIMA_MENSUAL = 20000;\n  const RECOVERY = 0.70;\n  function calc(){\n    const leads = +$('calc-leads').value || 0;\n    const resp  = +$('calc-resp').value || 0;\n    const cita  = (+$('calc-cita').value || 0)\u002F100;\n    const ticket= +$('calc-ticket').value || 0;\n    const cierre= (+$('calc-cierre').value || 0)\u002F100;\n    const inv   = +$('calc-inv').value || 0;\n    if(!leads || !ticket){ updateChart(0); return; }\n    const rate = lossRate(resp);\n    const leadsLost = leads * rate;\n    const revenueLostMonth = leadsLost * cita * cierre * ticket;\n    const revenueLostYear  = revenueLostMonth * 12;\n    const lost3m = revenueLostMonth * 3;\n    const burnedInv = inv * rate;\n    const ventasActuales = leads * (1 - rate) * cita * cierre;\n    const ventasPotenciales = leads * cita * cierre;\n    const cacReportado = ventasActuales > 0 ? inv \u002F ventasActuales : 0;\n    const cacPotencial = ventasPotenciales > 0 ? inv \u002F ventasPotenciales : 0;\n    const cacMult = (cacPotencial > 0 && cacReportado > 0) ? (cacReportado \u002F cacPotencial) : 0;\n    const ventasRecuperables = leadsLost * RECOVERY * cita * cierre;\n    const revenueRecuperable = ventasRecuperables * ticket;\n    const roi = revenueRecuperable \u002F DOPIMA_MENSUAL;\n\n    $('out-mes').textContent   = fmtShort(revenueLostMonth);\n    $('out-leads').textContent = Math.round(leadsLost).toLocaleString('es-MX') + ' leads';\n    $('out-ano').textContent   = fmtFull(revenueLostYear);\n    $('out-burn').textContent  = inv > 0 ? fmtFull(burnedInv) : '$—';\n    $('out-cac').textContent   = cacMult > 0 ? cacMult.toFixed(1) + '× más caro' : '—';\n    $('out-3m').textContent    = fmtFull(lost3m);\n    $('out-ventas').textContent = ventasRecuperables >= 1 ? ventasRecuperables.toFixed(1).replace(\u002F\\.0$\u002F,'') : ventasRecuperables.toFixed(2);\n    $('out-recup').textContent = fmtFull(revenueRecuperable);\n    $('out-roi').textContent   = roi > 0 ? roi.toFixed(0) + '×' : '—';\n\n    \u002F\u002F === Slide 18b · 3 capas de pérdida real ===\n    const burnedYear = burnedInv * 12;\n    updateChart(revenueLostMonth);\n    const rev12 = window.__s18bRev12 || 0;\n    const realTotal = rev12 + burnedYear;\n    const s18bRev = document.getElementById('s18b-rev');\n    if(s18bRev) s18bRev.textContent = rev12 > 0 ? fmtFull(rev12) : '$—';\n    const outReal = document.getElementById('out-real12');\n    if(outReal) outReal.textContent = realTotal > 0 ? Math.round(realTotal).toLocaleString('es-MX') : '—';\n    const l1 = document.getElementById('out-layer1'); if(l1) l1.textContent = fmtFull(rev12);\n    const l2 = document.getElementById('out-layer2'); if(l2) l2.textContent = fmtFull(burnedYear);\n    const l3 = document.getElementById('out-layer3'); if(l3) l3.textContent = cacMult > 0 ? cacMult.toFixed(1) + '×' : '—';\n    const maxLayer = Math.max(rev12, burnedYear, 1);\n    const b1 = document.getElementById('bar1'); if(b1) b1.style.width = rev12 > 0 ? (rev12\u002FmaxLayer*100) + '%' : '0%';\n    const b2 = document.getElementById('bar2'); if(b2) b2.style.width = burnedYear > 0 ? (burnedYear\u002FmaxLayer*100) + '%' : '0%';\n    const b3 = document.getElementById('bar3'); if(b3) b3.style.width = cacMult > 0 ? Math.min(100, (cacMult\u002F3)*100) + '%' : '0%';\n\n    \u002F\u002F === Recap $487K dinámico (slide 23, 15 y cover) ===\n    \u002F\u002F Basado en revenueRecuperable (monto mensual que Dopima recupera)\n    function splitShort(n){\n      if(!isFinite(n) || n<=0) return {num:'—', unit:''};\n      if(n >= 1e6) return {num:(n\u002F1e6).toFixed(1).replace(\u002F\\.0$\u002F,''), unit:'M'};\n      if(n >= 1e3) return {num:Math.round(n\u002F1e3).toString(), unit:'K'};\n      return {num:Math.round(n).toLocaleString('es-MX'), unit:''};\n    }\n    const rev = splitShort(revenueRecuperable);\n    ['out-recap-rev-n','out-kpi-rev-n','out-cover-rev-n'].forEach(id => {\n      const el = document.getElementById(id); if(el) el.textContent = rev.num;\n    });\n    ['out-recap-rev-u','out-kpi-rev-u','out-cover-rev-u'].forEach(id => {\n      const el = document.getElementById(id); if(el) el.textContent = rev.unit;\n    });\n\n    \u002F\u002F === Slide 21 · Historia 03 - stats dinámicos ===\n    const revAnual = splitShort(revenueRecuperable * 12);\n    const hv = document.getElementById('out-hist-ventas');\n    if(hv) hv.textContent = ventasRecuperables > 0 ? (ventasRecuperables >= 1 ? ventasRecuperables.toFixed(0) : ventasRecuperables.toFixed(1)) : '—';\n    const hrn = document.getElementById('out-hist-rev-n'); if(hrn) hrn.textContent = revAnual.num;\n    const hru = document.getElementById('out-hist-rev-u'); if(hru) hru.textContent = revAnual.unit;\n    const hr = document.getElementById('out-hist-roi'); if(hr) hr.textContent = roi > 0 ? roi.toFixed(0) : '—';\n    const hl = document.getElementById('out-hist-leads');\n    if(hl) hl.textContent = leadsLost > 0 ? Math.round(leadsLost * RECOVERY).toLocaleString('es-MX') : '—';\n  }\n  function updateChart(monthly){\n    const bars = document.querySelectorAll('.s9-bar');\n    const total = document.getElementById('out-total12');\n    if(monthly <= 0){\n      bars.forEach(b => { const el=b.querySelector('.v'); if(el) el.textContent = '$—'; });\n      if(total) total.textContent = '—';\n      ['y0','y1','y2','y3'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = '$—'; });\n      return;\n    }\n    const values = [];\n    for(let m=1; m<=12; m++){\n      let v = monthly;\n      if(m>=7) v = monthly * Math.pow(1.08, m-6);\n      values.push(v);\n    }\n    const max = Math.max(...values);\n    const sum = values.reduce((a,b)=>a+b,0);\n    bars.forEach((b,i)=>{\n      const v = values[i];\n      const h = Math.max(8, (v\u002Fmax)*94);\n      const body = b.querySelector('.s9-bar-body'); if(body) body.style.height = h + '%';\n      const vEl = b.querySelector('.v'); if(vEl) vEl.textContent = fmtFull(v);\n    });\n    if(total) total.textContent = Math.round(sum).toLocaleString('es-MX');\n    window.__s18bRev12 = sum;\n    const fracs = [1, 0.75, 0.5, 0.25];\n    ['y0','y1','y2','y3'].forEach((id,i)=>{ const el=document.getElementById(id); if(el) el.textContent = fmtFull(max*fracs[i]); });\n  }\n  inputs.filter(Boolean).forEach(i => { i.addEventListener('input', calc); i.addEventListener('change', calc); i.addEventListener('keydown', e => e.stopPropagation()); });\n  if(document.readyState === 'loading'){ document.addEventListener('DOMContentLoaded', calc); } else { calc(); }\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
