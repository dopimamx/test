<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <rect width="200" height="200" fill="#FEF0F4"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#F54E7A" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <g clip-path="url(#circle-clip)">

    <!-- Libros decorativos -->
    <g transform="translate(150 40) rotate(-12)">
      <rect x="0" y="0" width="30" height="6" fill="#F54E7A" opacity="0.4"/>
      <rect x="0" y="8" width="30" height="6" fill="#FBA4BC" opacity="0.4"/>
      <rect x="0" y="16" width="30" height="6" fill="#182247" opacity="0.3"/>
    </g>
    <circle cx="35" cy="165" r="18" fill="#FBA4BC" opacity="0.3"/>
    <!-- Cabeza -->
    <ellipse cx="100" cy="78" rx="32" ry="36" fill="#C99371"/>
    <!-- Pelo largo -->
    <path d="M65,75 Q65,40 100,38 Q135,40 135,75 L135,110 Q132,115 128,112 L128,80 Q132,52 100,48 Q68,52 72,80 L72,112 Q68,115 65,110Z" fill="#5B3F32"/>
    <!-- Lentes -->
    <circle cx="89" cy="80" r="9" fill="none" stroke="#182247" stroke-width="1.8"/>
    <circle cx="111" cy="80" r="9" fill="none" stroke="#182247" stroke-width="1.8"/>
    <line x1="98" y1="80" x2="102" y2="80" stroke="#182247" stroke-width="1.8"/>
    <!-- Ojos -->
    <circle cx="89" cy="80" r="2" fill="#140B10"/>
    <circle cx="111" cy="80" r="2" fill="#140B10"/>
    <!-- Sonrisa -->
    <path d="M92,94 Q100,100 108,94" fill="none" stroke="#140B10" stroke-width="2" stroke-linecap="round"/>
    <!-- Cuello -->
    <rect x="92" y="110" width="16" height="18" fill="#C99371"/>
    <!-- Blusa con cuello -->
    <path d="M55,200 L55,158 Q55,138 78,132 L100,148 L122,132 Q145,138 145,158 L145,200Z" fill="#FBA4BC"/>
    <!-- Cuello camisa -->
    <path d="M86,132 L100,150 L114,132 L100,140Z" fill="#FFFFFF"/>

  </g>
</svg>