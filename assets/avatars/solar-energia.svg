<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <rect width="200" height="200" fill="#FEF0F4"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#F54E7A" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <g clip-path="url(#circle-clip)">

    <!-- Sol decorativo -->
    <g transform="translate(160 40)" opacity="0.4">
      <circle cx="0" cy="0" r="14" fill="#F54E7A"/>
      <g stroke="#F54E7A" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-22" x2="0" y2="-18"/>
        <line x1="0" y1="22" x2="0" y2="18"/>
        <line x1="-22" y1="0" x2="-18" y2="0"/>
        <line x1="22" y1="0" x2="18" y2="0"/>
        <line x1="-15" y1="-15" x2="-13" y2="-13"/>
        <line x1="15" y1="15" x2="13" y2="13"/>
        <line x1="-15" y1="15" x2="-13" y2="13"/>
        <line x1="15" y1="-15" x2="13" y2="-13"/>
      </g>
    </g>
    <!-- Panel solar pequeño -->
    <g transform="translate(20 165) rotate(-15)" opacity="0.5">
      <rect x="0" y="0" width="36" height="22" fill="#182247"/>
      <line x1="12" y1="0" x2="12" y2="22" stroke="#FAF7F5" stroke-width="0.5"/>
      <line x1="24" y1="0" x2="24" y2="22" stroke="#FAF7F5" stroke-width="0.5"/>
      <line x1="0" y1="11" x2="36" y2="11" stroke="#FAF7F5" stroke-width="0.5"/>
    </g>
    <!-- Cabeza -->
    <ellipse cx="100" cy="84" rx="30" ry="34" fill="#C99371"/>
    <!-- Casco amarillo solar — cambio a tono rosa Dopima  -->
    <path d="M65,72 Q65,45 100,42 Q135,45 135,72 L135,80 L65,80Z" fill="#F54E7A"/>
    <rect x="62" y="78" width="76" height="4" fill="#DB3E68"/>
    <!-- Lente del casco -->
    <ellipse cx="100" cy="62" rx="12" ry="6" fill="#FFFFFF" opacity="0.3"/>
    <!-- Ojos -->
    <circle cx="89" cy="86" r="2.5" fill="#140B10"/>
    <circle cx="111" cy="86" r="2.5" fill="#140B10"/>
    <!-- Sonrisa -->
    <path d="M92,100 Q100,106 108,100" fill="none" stroke="#140B10" stroke-width="2" stroke-linecap="round"/>
    <!-- Bigote pequeño -->
    <path d="M93,96 Q100,93 107,96" fill="none" stroke="#5B3F32" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Cuello -->
    <rect x="92" y="116" width="16" height="14" fill="#C99371"/>
    <!-- Camisa de trabajo navy -->
    <path d="M55,200 L55,158 Q55,138 75,135 L92,130 L100,150 L108,130 L125,135 Q145,138 145,158 L145,200Z" fill="#182247"/>
    <!-- Reflectante -->
    <rect x="55" y="160" width="90" height="3" fill="#FBA4BC" opacity="0.7"/>

  </g>
</svg>