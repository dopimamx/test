<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <rect width="200" height="200" fill="#FEF0F4"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#F54E7A" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <g clip-path="url(#circle-clip)">

    <!-- Lentes grandes decorativos -->
    <g transform="translate(140 40)" opacity="0.4">
      <circle cx="-8" cy="0" r="10" fill="none" stroke="#F54E7A" stroke-width="2.5"/>
      <circle cx="14" cy="0" r="10" fill="none" stroke="#F54E7A" stroke-width="2.5"/>
      <line x1="2" y1="0" x2="4" y2="0" stroke="#F54E7A" stroke-width="2.5"/>
    </g>
    <circle cx="35" cy="170" r="16" fill="#FBA4BC" opacity="0.3"/>
    <!-- Cabeza -->
    <ellipse cx="100" cy="78" rx="32" ry="36" fill="#E8B894"/>
    <!-- Pelo profesional medio -->
    <path d="M68,72 Q70,40 100,38 Q130,40 132,72 Q130,55 120,50 Q110,46 100,46 Q90,46 80,50 Q70,55 68,72Z" fill="#5B3F32"/>
    <path d="M68,72 Q72,90 78,98 L78,72Z" fill="#5B3F32"/>
    <path d="M132,72 Q128,90 122,98 L122,72Z" fill="#5B3F32"/>
    <!-- Lentes grandes (highlight) -->
    <circle cx="89" cy="80" r="11" fill="#FFFFFF" fill-opacity="0.2" stroke="#182247" stroke-width="2"/>
    <circle cx="111" cy="80" r="11" fill="#FFFFFF" fill-opacity="0.2" stroke="#182247" stroke-width="2"/>
    <line x1="100" y1="80" x2="100" y2="80" stroke="#182247" stroke-width="2"/>
    <path d="M99,78 L101,78" stroke="#182247" stroke-width="2"/>
    <!-- Reflejo en lentes -->
    <path d="M84,76 Q86,73 89,73" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.8"/>
    <path d="M106,76 Q108,73 111,73" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.8"/>
    <!-- Ojos detrás -->
    <circle cx="89" cy="80" r="2" fill="#140B10"/>
    <circle cx="111" cy="80" r="2" fill="#140B10"/>
    <!-- Sonrisa -->
    <path d="M92,94 Q100,100 108,94" fill="none" stroke="#140B10" stroke-width="2" stroke-linecap="round"/>
    <!-- Cuello -->
    <rect x="92" y="110" width="16" height="18" fill="#E8B894"/>
    <!-- Bata + blusa -->
    <path d="M55,200 L55,160 Q55,140 75,135 L92,128 L100,150 L108,128 L125,135 Q145,140 145,160 L145,200Z" fill="#FFFFFF"/>
    <!-- Blusa interior rosa -->
    <path d="M86,128 L100,150 L114,128 L100,140Z" fill="#F54E7A"/>
    <!-- Detalle bolsillo -->
    <rect x="115" y="158" width="22" height="18" fill="none" stroke="#EADFE4" stroke-width="1" rx="1"/>
    <line x1="120" y1="148" x2="123" y2="160" stroke="#F54E7A" stroke-width="2" stroke-linecap="round"/>

  </g>
</svg>