<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <rect width="200" height="200" fill="#FEF0F4"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#F54E7A" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <g clip-path="url(#circle-clip)">

    <!-- Engranaje -->
    <g transform="translate(160 40)" opacity="0.3">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#F54E7A" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="4" fill="#F54E7A"/>
      <g stroke="#F54E7A" stroke-width="3" stroke-linecap="square">
        <line x1="0" y1="-18" x2="0" y2="-15"/>
        <line x1="0" y1="18" x2="0" y2="15"/>
        <line x1="-18" y1="0" x2="-15" y2="0"/>
        <line x1="18" y1="0" x2="15" y2="0"/>
        <line x1="-13" y1="-13" x2="-11" y2="-11"/>
        <line x1="13" y1="13" x2="11" y2="11"/>
        <line x1="-13" y1="13" x2="-11" y2="11"/>
        <line x1="13" y1="-13" x2="11" y2="-11"/>
      </g>
    </g>
    <!-- Cabeza -->
    <ellipse cx="100" cy="84" rx="30" ry="34" fill="#C99371"/>
    <!-- Casco industrial gris -->
    <path d="M65,72 Q65,45 100,42 Q135,45 135,72 L135,80 L65,80Z" fill="#3E4A6B"/>
    <rect x="62" y="78" width="76" height="4" fill="#2A345C"/>
    <!-- Logo en casco -->
    <circle cx="100" cy="60" r="6" fill="#F54E7A"/>
    <!-- Ojos -->
    <circle cx="89" cy="86" r="2.5" fill="#140B10"/>
    <circle cx="111" cy="86" r="2.5" fill="#140B10"/>
    <!-- Sonrisa -->
    <path d="M92,100 Q100,106 108,100" fill="none" stroke="#140B10" stroke-width="2" stroke-linecap="round"/>
    <!-- Cuello -->
    <rect x="92" y="116" width="16" height="14" fill="#C99371"/>
    <!-- Camisa industrial -->
    <path d="M55,200 L55,158 Q55,138 75,133 L92,130 L100,150 L108,130 L125,133 Q145,138 145,158 L145,200Z" fill="#182247"/>
    <!-- Reflectante -->
    <rect x="55" y="160" width="90" height="3" fill="#FBA4BC" opacity="0.7"/>
    <rect x="55" y="170" width="90" height="3" fill="#FBA4BC" opacity="0.5"/>
    <!-- Bolsillo con pluma -->
    <line x1="125" y1="148" x2="128" y2="160" stroke="#F54E7A" stroke-width="2" stroke-linecap="round"/>

  </g>
</svg>