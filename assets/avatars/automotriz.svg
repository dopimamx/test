<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <rect width="200" height="200" fill="#FEF0F4"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#F54E7A" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <g clip-path="url(#circle-clip)">

    <!-- Coche silueta -->
    <g transform="translate(140 40)" opacity="0.3">
      <path d="M0,15 Q3,8 12,8 L20,8 L24,2 L36,2 L42,8 L48,8 Q54,10 54,16 L54,22 L0,22Z" fill="#182247"/>
      <circle cx="12" cy="22" r="4" fill="#182247"/>
      <circle cx="42" cy="22" r="4" fill="#182247"/>
    </g>
    <!-- Cabeza -->
    <ellipse cx="100" cy="78" rx="32" ry="36" fill="#E8B894"/>
    <!-- Pelo profesional -->
    <path d="M68,70 Q70,40 100,38 Q130,40 132,70 Q132,55 122,50 Q110,46 100,46 Q90,46 78,50 Q68,55 68,70Z" fill="#2A1F26"/>
    <!-- Ojos -->
    <circle cx="89" cy="78" r="2.5" fill="#140B10"/>
    <circle cx="111" cy="78" r="2.5" fill="#140B10"/>
    <!-- Sonrisa confiada -->
    <path d="M92,92 Q100,99 108,92" fill="none" stroke="#140B10" stroke-width="2" stroke-linecap="round"/>
    <!-- Cuello -->
    <rect x="92" y="110" width="16" height="18" fill="#E8B894"/>
    <!-- Saco gris automotriz -->
    <path d="M55,200 L55,160 Q55,140 75,135 L92,128 L100,150 L108,128 L125,135 Q145,140 145,160 L145,200Z" fill="#3E4A6B"/>
    <!-- Solapa -->
    <path d="M92,128 L100,150 L108,128 L100,158Z" fill="#2A345C"/>
    <!-- Camisa -->
    <path d="M93,128 L100,148 L107,128 L100,200 L93,200Z" fill="#FFFFFF" opacity="0.95"/>
    <!-- Llaves colgando del bolsillo -->
    <g transform="translate(125 158)">
      <line x1="0" y1="0" x2="-4" y2="14" stroke="#F54E7A" stroke-width="1.5"/>
      <circle cx="-5" cy="16" r="3" fill="none" stroke="#F54E7A" stroke-width="1.5"/>
      <rect x="-2" y="6" width="3" height="2" fill="#F54E7A"/>
    </g>

  </g>
</svg>