<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <rect width="200" height="200" fill="#FEF0F4"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#F54E7A" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
  <g clip-path="url(#circle-clip)">

    <!-- Megáfono pequeño -->
    <g transform="translate(150 40) rotate(-15)" opacity="0.4">
      <path d="M0,5 L20,0 L20,20 L0,15Z" fill="#F54E7A"/>
      <rect x="-4" y="6" width="6" height="8" fill="#F54E7A"/>
    </g>
    <!-- Ondas de sonido -->
    <path d="M170,55 Q175,60 175,70" fill="none" stroke="#F54E7A" stroke-width="1.5" opacity="0.5"/>
    <path d="M178,50 Q188,60 188,75" fill="none" stroke="#F54E7A" stroke-width="1.5" opacity="0.4"/>
    <!-- Cabeza -->
    <ellipse cx="100" cy="78" rx="32" ry="36" fill="#E8B894"/>
    <!-- Pelo creativo (bob con flequillo) -->
    <path d="M65,75 Q65,38 100,38 Q135,38 135,75 L135,108 Q132,112 128,110 L128,82 Q132,50 100,46 Q90,46 84,52 L84,72 Q70,74 72,82 L72,110 Q68,112 65,108Z" fill="#F54E7A"/>
    <!-- Mechón color -->
    <path d="M75,55 Q80,48 90,46 L92,52 Q82,55 78,62Z" fill="#FBA4BC"/>
    <!-- Aretes geométricos -->
    <rect x="65" y="92" width="4" height="8" fill="#182247"/>
    <rect x="131" y="92" width="4" height="8" fill="#182247"/>
    <!-- Ojos -->
    <circle cx="89" cy="80" r="2.5" fill="#140B10"/>
    <circle cx="111" cy="80" r="2.5" fill="#140B10"/>
    <!-- Lipstick -->
    <path d="M92,93 Q100,99 108,93" fill="#F54E7A" stroke="#DB3E68" stroke-width="0.8"/>
    <!-- Cuello -->
    <rect x="92" y="110" width="16" height="18" fill="#E8B894"/>
    <!-- Blusa creativa con estampado -->
    <path d="M55,200 L55,160 Q55,140 75,135 L92,128 L100,150 L108,128 L125,135 Q145,140 145,160 L145,200Z" fill="#FAF7F5"/>
    <!-- Estampado puntos -->
    <circle cx="75" cy="160" r="3" fill="#F54E7A"/>
    <circle cx="90" cy="180" r="3" fill="#182247"/>
    <circle cx="115" cy="170" r="3" fill="#F54E7A"/>
    <circle cx="125" cy="190" r="3" fill="#182247"/>
    <circle cx="65" cy="190" r="3" fill="#FBA4BC"/>
    <!-- Cuello V -->
    <path d="M86,128 L100,150 L114,128 L100,138Z" fill="#FEF0F4"/>

  </g>
</svg>