<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Dopima — Sistema comercial llave en mano">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F5"/>
      <stop offset="100%" stop-color="#FDE3EB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- dopima logo (center-top) -->
  <g transform="translate(600, 210)" text-anchor="middle">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="700" font-size="170" fill="#F54E7A" letter-spacing="-7">dopima</text>
    <circle cx="135" cy="-115" r="22" fill="#F54E7A"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="400" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="600" font-size="40" fill="#140B10" letter-spacing="-1" text-anchor="middle">El sistema que hace que ganar</text>
  <text x="600" y="454" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="600" font-size="40" fill="#140B10" letter-spacing="-1" text-anchor="middle">se vuelva hábito.</text>

  <!-- Subtitle / chips -->
  <g transform="translate(600, 510)" text-anchor="middle">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="16" fill="#3E2A33" letter-spacing="3">CRM &#x2022; WHATSAPP &#x2022; AUTOMATIZACIÓN &#x2022; MÉXICO</text>
  </g>

  <g transform="translate(600, 575)" text-anchor="middle">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" fill="#6E5C64" letter-spacing="2">DOPIMA.COM</text>
  </g>
</svg>