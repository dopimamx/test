<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Dopima blog: Monday CRM vs Pipedrive vs Zoho">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A345C"/>
      <stop offset="100%" stop-color="#453967"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#F54E7A" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#F54E7A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(72, 72)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="700" font-size="38" fill="#FFB5CA" letter-spacing="-1">dopima</text>
    <circle cx="148" cy="-12" r="6" fill="#FFB5CA"/>
  </g>

  <g transform="translate(72, 200)">
    <line x1="0" y1="-8" x2="32" y2="-8" stroke="#FFB5CA" stroke-width="1.5"/>
    <text x="44" y="-2" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" fill="#FFB5CA" letter-spacing="3" font-weight="500"
          text-transform="uppercase">COMPARATIVA · MID-MARKET</text>
  </g>

  <text x="72" y="290" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="700" font-size="92" fill="#FFB5CA" letter-spacing="-3">Monday CRM</text>
  <text x="72" y="385" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="400" font-size="60" fill="rgba(255,181,202,0.55)" letter-spacing="-1.5">vs Pipedrive</text>
  <text x="72" y="450" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="400" font-size="60" fill="rgba(255,181,202,0.55)" letter-spacing="-1.5">vs Zoho CRM</text>

  <text x="72" y="540" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="600" font-size="26" fill="#FFFFFF" letter-spacing="-0.3">Comparativa para PyME en México · 2026</text>

  <text x="1128" y="575" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" fill="rgba(255,255,255,0.6)" letter-spacing="2">DOPIMA.COM/BLOG</text>
</svg>