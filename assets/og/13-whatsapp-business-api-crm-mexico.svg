<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Dopima blog: WhatsApp Business API CRM Mexico">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1530"/>
      <stop offset="100%" stop-color="#25D366"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#F54E7A" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#F54E7A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(72, 72)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="700" font-size="38" fill="#FFFFFF" letter-spacing="-1">dopima</text>
    <circle cx="148" cy="-12" r="6" fill="#FFFFFF"/>
  </g>

  <g transform="translate(72, 200)">
    <line x1="0" y1="-8" x2="32" y2="-8" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="44" y="-2" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" fill="#FFFFFF" letter-spacing="3" font-weight="500"
          text-transform="uppercase">WHATSAPP · DECISIÓN</text>
  </g>

  <!-- Big number: 98% -->
  <text x="72" y="380" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="700" font-size="160" fill="#FFFFFF" letter-spacing="-7">98%</text>

  <!-- Subtitle explaining the stat -->
  <text x="72" y="440" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="500" font-size="28" fill="rgba(255,255,255,0.75)" letter-spacing="-0.5">tasa de apertura de WhatsApp</text>

  <!-- Main headline -->
  <text x="72" y="510" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="600" font-size="34" fill="#FFFFFF" letter-spacing="-1">WhatsApp Business API + CRM</text>
  <text x="72" y="548" font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="600" font-size="34" fill="#FFFFFF" letter-spacing="-1">Guía de decisión · México 2026</text>

  <text x="1128" y="575" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" fill="rgba(255,255,255,0.65)" letter-spacing="2">DOPIMA.COM/BLOG</text>
</svg>