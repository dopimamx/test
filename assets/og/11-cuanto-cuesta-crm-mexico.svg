<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Dopima blog: Cuanto cuesta un CRM en Mexico">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B3A5E"/>
      <stop offset="100%" stop-color="#DB3E68"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#FFB5CA" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFB5CA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(72, 72)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="700" font-size="38" fill="#FFB5CA" letter-spacing="-1">dopima</text>
    <circle cx="148" cy="-12" r="6" fill="#FFB5CA"/>
  </g>

  <g transform="translate(72, 220)">
    <line x1="0" y1="-8" x2="32" y2="-8" stroke="#FFB5CA" stroke-width="1.5"/>
    <text x="44" y="-2" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" fill="#FFB5CA" letter-spacing="3" font-weight="500"
          text-transform="uppercase">PRICING</text>
  </g>

  <g transform="translate(72, 280)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="700" font-size="130" fill="#FFB5CA" letter-spacing="-5"
          dominant-baseline="hanging">$80K-$800K</text>
  </g>

  <g transform="translate(72, 470)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="600" font-size="38" fill="#FFFFFF" letter-spacing="-1">Cuánto cuesta implementar</text>
    <text x="0" y="48" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="600" font-size="38" fill="#FFFFFF" letter-spacing="-1">un CRM en México</text>
  </g>

  <g transform="translate(1128, 575)" text-anchor="end">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" fill="rgba(255,255,255,0.6)" letter-spacing="2">DOPIMA.COM/BLOG</text>
  </g>
</svg>