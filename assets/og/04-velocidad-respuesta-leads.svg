<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Dopima blog: Por qué los primeros 5 minutos deciden tu venta">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A345C"/>
      <stop offset="100%" stop-color="#453967"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#F54E7A" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#F54E7A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top label: dopima -->
  <g transform="translate(72, 72)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="700" font-size="38" fill="#FFB5CA" letter-spacing="-1">dopima</text>
    <circle cx="148" cy="-12" r="6" fill="#FFB5CA"/>
  </g>

  <!-- Category eyebrow -->
  <g transform="translate(72, 220)">
    <line x1="0" y1="-8" x2="32" y2="-8" stroke="#FFB5CA" stroke-width="1.5"/>
    <text x="44" y="-2" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" fill="#FFB5CA" letter-spacing="3" font-weight="500"
          text-transform="uppercase">VELOCIDAD</text>
  </g>

  <!-- Big stat -->
  <g transform="translate(72, 280)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif"
          font-weight="700" font-size="160" fill="#FFB5CA" letter-spacing="-7"
          dominant-baseline="hanging">7×</text>
  </g>

  <!-- Title (multi-line, manual wrapping) -->
  <g transform="translate(72, 460)">
    <text x="0" y="0" font-family="Bricolage Grotesque, system-ui, sans-serif" font-weight="600" font-size="40" fill="#FFFFFF" letter-spacing="-1.2">Por qué los primeros 5 minutos deciden tu</text>
    <text x="0" y="52" font-family="Bricolage Grotesque, system-ui, sans-serif" font-weight="600" font-size="40" fill="#FFFFFF" letter-spacing="-1.2">venta</text>
  </g>

  <!-- Bottom-right URL -->
  <g transform="translate(1128, 575)" text-anchor="end">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="14" fill="rgba(255,255,255,0.6)" letter-spacing="2">DOPIMA.COM/BLOG</text>
  </g>
</svg>